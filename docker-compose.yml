services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pixshare
      POSTGRES_USER: pixshare_user
      POSTGRES_PASSWORD: pixshare_password
    # Host port: default 5433 avoids clash with a local PostgreSQL on 5432.
    # Containers still use hostname `postgres` and port 5432 on the Docker network.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixshare_user -d pixshare"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    # Host port: override if busy, e.g. BACKEND_HOST_PORT=5020 docker compose up
    ports:
      - "${BACKEND_HOST_PORT:-5010}:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://pixshare_user:pixshare_password@postgres:5432/pixshare
      SECRET_KEY: pixshare-secret-key-change-in-prod
      PORT: "5000"
      NODE_ENV: development
      CORS_ORIGINS: "*"
      PUBLIC_BASE_URL: "http://127.0.0.1:${BACKEND_HOST_PORT:-5010}"
      LUMINA_API_PUBLIC_URL: "http://127.0.0.1:${BACKEND_HOST_PORT:-5010}"
    command:
      - "sh"
      - "-c"
      - |
        if [ ! -d node_modules/express ]; then npm install; fi
        printf "\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n  Lumina вЂ” REST API (Node):\n  %s\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\n" "$$LUMINA_API_PUBLIC_URL"
        exec node src/index.js
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    # Vite dev server inside container on 5173 в†’ host 5510 by default
    ports:
      - "${FRONTEND_HOST_PORT:-5510}:5173"
    environment:
      VITE_API_BASE: "http://127.0.0.1:${BACKEND_HOST_PORT:-5010}"
      LUMINA_UI_PUBLIC_URL: "http://127.0.0.1:${FRONTEND_HOST_PORT:-5510}"
      LUMINA_API_PUBLIC_URL: "http://127.0.0.1:${BACKEND_HOST_PORT:-5010}"
    command:
      - "sh"
      - "-c"
      - |
        if [ ! -d node_modules/vite ]; then npm install; fi
        printf "\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n  Lumina вЂ” React app (Vite):\n  %s\n  API: %s\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\n" "$$LUMINA_UI_PUBLIC_URL" "$$LUMINA_API_PUBLIC_URL"
        exec npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules: